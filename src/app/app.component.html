<div class="flex flex-column h-full min-h-screen justify-content-evenly">
  <header class="flex flex-initial">
    <p-toolbar>
      <div class="p-toolbar-group-start">
        <!-- <h2 class="title">{{ title }}</h2> -->
        <a routerLink="/">
          <img src="assets/logo.png" id="logo" alt="logo" aria-label="label" />
          <img src="assets/icon.svg" id="logo-icon" alt="logo svg" aria-label="logo svg" />
        </a>
      </div>
      <div class="p-toolbar-group-center text-sm">
        <!-- <i class="pi pi-search"></i> -->
      </div>
      <div class="p-toolbar-group-end">
        <!-- Lock/Authentication Status Button -->
        <p-button 
          [icon]="isAuthenticated() ? 'pi pi-lock-open' : 'pi pi-lock'"
          variant="text" 
          (onClick)="onLockClick()"
          [pTooltip]="isAuthenticated() ? ('Logout' | transloco) : ('Not authenticated' | transloco)"
          tooltipPosition="bottom"
          [disabled]="!isAuthenticated()">
        </p-button>
        
        @if (isAuthenticated()) {
          <p-button 
            icon="pi pi-bars" 
            variant="text" 
            (onClick)="toggleDrawer()"
            [pTooltip]="'Menu' | transloco"
            tooltipPosition="bottom">
          </p-button>
        }
      </div>
    </p-toolbar>
  </header>
  <main class="flex flex-grow-1 flex-column">
    <router-outlet></router-outlet>
  </main>

  <footer class="flex flex-initial justify-content-center">
    <app-version />
  </footer>

  <!-- Menu Drawer -->
  <p-drawer 
    [(visible)]="showDrawer" 
    [modal]="true" 
    position="right" 
    [style]="{ width: '300px' }"
    [header]="'Menu' | transloco">
    
    <div class="flex flex-column gap-2">
      <p-menu [model]="menuItems" [style]="{ border: 'none' }"></p-menu>
    </div>
  </p-drawer>
</div>
